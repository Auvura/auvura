# Auvura Proxy Configuration
# Copy this file to auvura.toml and customize.

[server]
host = "127.0.0.1"
port = 3000

# Provider API keys.
# Use `api_key_env` to read from an environment variable (recommended),
# or `api_key` to set the key directly (not recommended for production).
[providers.openai]
api_key_env = "OPENAI_API_KEY"

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"

# Redaction policy (optional — defaults to detecting all core PII types).
# [policy]
# enabled_types = ["email", "phone", "ssn", "credit_card", "ipv4", "ipv6"]
# blocklist = ["CONFIDENTIAL"]
# allowlist = ["Apple Inc"]
#
# Optional: ISO 3166-1 alpha-2 country codes for phone detection.
# Countries are tried in order; the first match wins.
# Default: ["US", "GB", "DE", "FR", "CA", "AU", "JP"]
# phone_countries = ["US", "DE", "JP"]

# CORS configuration (optional — disabled by default).
# Required for browser-based SDK integrations.
# [cors]
# allowed_origins = ["https://app.example.com"]
# allowed_methods = ["POST", "OPTIONS"]          # Default if omitted
# allowed_headers = ["Content-Type", "Authorization"]  # Default if omitted
# allow_credentials = false                       # Default if omitted
# max_age = 3600                                  # Preflight cache seconds (default: none)
