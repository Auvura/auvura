# Auvura Proxy Configuration
# Copy this file to auvura.toml and customize.

[server]
host = "127.0.0.1"
port = 3000

# Provider API keys.
# Use `api_key_env` to read from an environment variable (recommended),
# or `api_key` to set the key directly (not recommended for production).
[providers.openai]
api_key_env = "OPENAI_API_KEY"

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"

# Google Gemini
[providers.gemini]
api_key_env = "GEMINI_API_KEY"

# Mistral AI
[providers.mistral]
api_key_env = "MISTRAL_API_KEY"

# Cohere
[providers.cohere]
api_key_env = "COHERE_API_KEY"

# Azure OpenAI (uses api-key header instead of Bearer token)
[providers.azure]
api_key_env = "AZURE_API_KEY"

# AWS Bedrock (simplified auth - full SigV4 signing recommended for production)
[providers.bedrock]
api_key_env = "AWS_BEDROCK_API_KEY"

# Ollama (local inference - no API key needed)
[providers.ollama]
api_key = ""

# Redaction policy (optional — defaults to detecting all core PII types).
# [policy]
# enabled_types = ["email", "phone", "ssn", "credit_card", "ipv4", "ipv6"]
# blocklist = ["CONFIDENTIAL"]
# allowlist = ["Apple Inc"]
#
# Optional: ISO 3166-1 alpha-2 country codes for phone detection.
# Countries are tried in order; the first match wins.
# Default: ["US", "GB", "DE", "FR", "CA", "AU", "JP"]
# phone_countries = ["US", "DE", "JP"]

# CORS configuration (optional — disabled by default).
# Required for browser-based SDK integrations.
# [cors]
# allowed_origins = ["https://app.example.com"]
# allowed_methods = ["POST", "OPTIONS"]          # Default if omitted
# allowed_headers = ["Content-Type", "Authorization"]  # Default if omitted
# allow_credentials = false                       # Default if omitted
# max_age = 3600                                  # Preflight cache seconds (default: none)

# Rate limiting (optional — disabled by default).
# Protects against abuse with per-IP token bucket algorithm.
# [rate_limit]
# requests_per_second = 10    # Max requests per second per IP
# burst_size = 10             # Max concurrent requests in a burst (defaults to requests_per_second)

# Request size limits (optional — defaults to 10 MB).
# Set to 0 to disable size limits.
# [request_limit]
# max_body_bytes = 10485760   # 10 MB (default)
